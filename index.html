    <link rel="icon" type="image/png" href="romance-club.png">

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0b0c; color: #ffffff; overflow-x: hidden; scroll-behavior: smooth; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background-color: #121214; border-bottom: 2px solid #ff007f; position: sticky; top: 0; z-index: 100; }
        
        /* Pulse Logo Animation in Header */
        .logo-container img { height: 75px; width: auto; display: block; filter: drop-shadow(0 0 8px rgba(255, 0, 127, 0.4)); animation: pulseLogo 3s infinite ease-in-out; }
        
        nav ul { display: flex; list-style: none; align-items: center; }
        nav ul li { margin-left: 25px; }
        nav ul li a { color: #b3b3b3; text-decoration: none; font-size: 17px; font-weight: 600; transition: 0.3s; }
        nav ul li a:hover, nav ul li a.active { color: #ff007f; text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }
        
        .btn-book-nav { background: linear-gradient(135px, #ff007f, #b00058); color: white !important; padding: 8px 18px; border-radius: 20px; box-shadow: 0 4px 10px rgba(255, 0, 127, 0.3); transition: 0.3s; }
        .btn-book-nav:hover { transform: scale(1.05); box-shadow: 0 6px 15px rgba(255, 0, 127, 0.5); }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        
        /* Hero Section Styling with Animations */
        .hero { background: linear-gradient(rgba(11, 11, 12, 0.5), #0b0b0c), url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1200&auto=format&fit=crop') no-repeat center center/cover; height: 350px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; padding: 40px; margin-bottom: 40px; border: 1px solid #222; animation: fadeIn 1.2s ease-out; }
        
        /* Logo next to Exclusive Romantic Stream */
        .hero-title-container { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
        .hero h1 { font-size: 42px; color: #ff007f; text-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        .hero-logo { height: 80px; width: auto; filter: drop-shadow(0 0 12px rgba(255, 0, 127, 0.6)); animation: floatHeroLogo 4s infinite ease-in-out; }
        .hero p { font-size: 18px; color: #cccccc; max-width: 600px; }
        
        .section-title { font-size: 22px; margin-bottom: 20px; border-left: 4px solid #ff007f; padding-left: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-bottom: 50px; }
        
        /* 3D Cards Animation */
        .video-card { background-color: #121214; border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); opacity: 0; transform: translateY(20px); }
        .video-card.show { opacity: 1; transform: translateY(0); }
        .video-card:hover { transform: translateY(-8px) scale(1.02); border-color: #ff007f; box-shadow: 0 10px 20px rgba(255, 0, 127, 0.2); }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background-size: cover; background-position: center; transition: 0.5s; }
        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .play-btn { background: rgba(255, 0, 127, 0.9); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(255, 0, 127, 0.6); transition: 0.3s; }
        .video-card:hover .play-btn { transform: scale(1.15); background: #ff007f; box-shadow: 0 0 25px #ff007f; }

        .video-info { padding: 15px; background: #121214; }
        .video-title { font-size: 15px; font-weight: bold; margin-bottom: 8px; color: #ffffff; line-height: 1.4; height: 42px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .video-meta { font-size: 13px; color: #ff007f; display: flex; justify-content: space-between; font-weight: 500; }
        
        /* Animated Glassmorphism Form */
        .form-section { background: rgba(18, 18, 20, 0.75); border: 1px solid rgba(255, 0, 127, 0.3); border-radius: 12px; padding: 40px; max-width: 600px; margin: 40px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); transition: 0.4s; }
        .form-section:hover { border-color: #ff007f; box-shadow: 0 0 25px rgba(255, 0, 127, 0.2); }
        .form-section h3 { font-size: 24px; color: #ff007f; margin-bottom: 20px; text-align: center; text-transform: uppercase; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #b3b3b3; margin-bottom: 8px; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #0b0b0c; border: 1px solid #333; border-radius: 6px; color: white; font-size: 15px; transition: 0.3s; }
        .form-group input:focus, .form-group textarea:focus { border-color: #ff007f; outline: none; box-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }
        .btn-submit { background: #ff007f; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: #d00068; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }

        footer { background-color: #121214; text-align: center; padding: 20px; color: #666; font-size: 14px; border-top: 1px solid #222; margin-top: 40px; }

        /* Animation Keyframes */
        @keyframes pulseLogo {
            0% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(255, 0, 127, 0.4)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 0 15px rgba(255, 0, 127, 0.7)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(255, 0, 127, 0.4)); }
        }
        @keyframes floatHeroLogo {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) { 
            header { flex-direction: column; gap: 15px; } 
            nav ul li { margin: 0 10px; } 
            .hero-title-container { flex-direction: column; text-align: center; }
            .hero h1 { font-size: 32px; }
        }
